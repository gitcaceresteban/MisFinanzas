{% extends 'base.html' %}
{% block title %}{% if account %}Editar{% else %}Nueva{% endif %} cuenta{% endblock %}
{% block page_title %}{% if account %}Editar{% else %}Nueva{% endif %} cuenta{% endblock %}

{% block content %}
<div class="max-w-2xl">
    <div class="mb-6">
        <a href="/cuentas/" class="text-sm text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-white inline-flex items-center gap-1">
            <i data-lucide="chevron-left" class="w-4 h-4"></i> Volver
        </a>
    </div>

    <form method="POST" class="card-padded space-y-5">
        <div>
            <label class="label">Nombre de la cuenta</label>
            <input type="text" name="name" required class="input"
                   value="{{ account.name if account else '' }}"
                   placeholder="Ej: Cuenta corriente principal">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="label">Banco</label>
                <select name="bank_id" class="select">
                    <option value="">— Sin banco —</option>
                    {% for b in banks %}
                        <option value="{{ b.id }}" {% if account and account.bank_id == b.id %}selected{% endif %}>{{ b.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="label">Tipo</label>
                <select name="type" class="select">
                    {% for v, l in types %}
                        <option value="{{ v }}" {% if account and account.type == v %}selected{% endif %}>{{ l }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="label">Saldo actual (CLP)</label>
                <input type="text" inputmode="numeric" name="balance" class="input money-input"
                       value="{{ account.balance if account else 0 }}" placeholder="0">
            </div>
            <div>
                <label class="label">Línea de crédito (opcional)</label>
                <input type="text" inputmode="numeric" name="credit_line" class="input money-input"
                       value="{{ account.credit_line if account else 0 }}" placeholder="0">
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="label">Moneda</label>
                <input type="text" name="currency" class="input"
                       value="{{ account.currency if account else 'CLP' }}">
            </div>
            <div>
                <label class="label">Estado</label>
                <select name="status" class="select">
                    {% for v, l in statuses %}
                        <option value="{{ v }}" {% if account and account.status == v %}selected{% endif %}>{{ l }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div>
            <label class="label">Notas</label>
            <textarea name="notes" class="textarea" rows="3">{{ account.notes if account else '' }}</textarea>
        </div>

        <div class="flex gap-3 pt-4 border-t border-slate-100 dark:border-slate-800">
            <button type="submit" class="btn-primary">
                <i data-lucide="check" class="w-4 h-4"></i>
                <span>{{ 'Guardar' if account else 'Crear cuenta' }}</span>
            </button>
            <a href="/cuentas/" class="btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
