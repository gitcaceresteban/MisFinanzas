{% extends 'base.html' %}
{% block title %}Error {{ code }}{% endblock %}
{% block content %}
<div class="flex flex-col items-center justify-center py-24">
    <div class="w-20 h-20 rounded-2xl bg-rose-100 dark:bg-rose-950/40 flex items-center justify-center mb-6">
        <i data-lucide="alert-triangle" class="w-10 h-10 text-rose-600 dark:text-rose-400"></i>
    </div>
    <h1 class="text-4xl font-bold mb-2">{{ code }}</h1>
    <p class="text-base text-slate-500 dark:text-slate-400 mb-6 text-center">{{ message }}</p>
    <a href="/" class="btn-primary">
        <i data-lucide="home" class="w-4 h-4"></i>
        <span>Volver al inicio</span>
    </a>
</div>
{% endblock %}
